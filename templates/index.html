<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>PupDB - Distributed Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: #f8fafc;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .ring-container {
        position: relative;
        width: 350px;
        height: 350px;
        border-radius: 50%;
        border: 4px dashed #cbd5e1;
        margin: 40px auto;
        background: white;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      .center-dot {
        position: absolute;
        width: 12px;
        height: 12px;
        background: #94a3b8;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .node-point {
        position: absolute;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        border: 3px solid white;
        z-index: 10;
        transition: all 0.4s ease;
      }
      .key-point {
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        z-index: 5;
        transition: all 0.4s ease;
        border: 2px solid white;
      }
      .label {
        position: absolute;
        font-size: 11px;
        font-weight: bold;
        white-space: nowrap;
        transform: translate(-50%, -200%);
        text-shadow: 1px 1px 2px white;
        transition: all 0.4s ease;
      }
    </style>
  </head>
  <body class="text-slate-800 p-6">
    <div class="max-w-5xl mx-auto">
      <h1 class="text-3xl font-extrabold text-center text-slate-800 mb-10">
        Bộ Định Tuyến PupDB - Consistent Hashing
      </h1>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div
          class="bg-white p-6 rounded-xl shadow-lg flex flex-col items-center"
        >
          <h2 class="text-xl font-bold mb-2 text-slate-700">
            Cụm Máy Chủ
          </h2>
          <div id="ui-ring" class="ring-container">
            <div class="center-dot"></div>
          </div>
        </div>

        <div class="space-y-6">
          <div class="bg-white p-6 rounded-xl shadow-lg">
            <h2 class="text-xl font-bold mb-4 text-slate-700 flex items-center">
              Quản lý Server
            </h2>
            <div class="flex gap-2 mb-4">
              <span
                class="bg-gray-100 border border-r-0 rounded-l px-3 py-2 text-sm text-gray-600 flex items-center"
                >127.0.0.1:</span
              >
              <input
                type="number"
                id="node-port"
                class="border rounded-r px-3 py-2 w-full text-sm outline-none focus:border-blue-500"
                placeholder="Port (VD: 5004)"
              />
              <button
                onclick="addNode()"
                class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded text-sm font-bold shadow transition"
              >
                Thêm
              </button>
              <button
                onclick="syncData()"
                class="bg-teal-500 hover:bg-teal-600 text-white px-3 py-2 rounded text-sm font-bold shadow transition"
              >
                Đồng bộ
              </button>
            </div>
            <ul
              id="node-list"
              class="space-y-2 max-h-[200px] overflow-y-auto pr-2"
            ></ul>
          </div>

          <div class="bg-white p-6 rounded-xl shadow-lg">
            <h2 class="text-xl font-bold mb-4 text-slate-700">
              Ghi/Đọc Dữ liệu
            </h2>
            <div class="space-y-3 mb-4 bg-slate-50 p-4 rounded-lg border">
              <input
                type="text"
                id="data-key"
                class="border rounded px-3 py-2 w-full text-sm outline-none"
                placeholder="Key"
              />
              <input
                type="text"
                id="data-value"
                class="border rounded px-3 py-2 w-full text-sm outline-none"
                placeholder="Value"
              />
              <div class="flex items-center gap-2">
                <label class="text-sm font-bold">Số bản sao:</label>
                <input
                  type="number"
                  id="data-replicas"
                  value="2"
                  min="1"
                  max="5"
                  class="border rounded px-2 py-1 w-16 text-sm text-center"
                />
              </div>
              <div class="flex gap-2">
                <button
                  onclick="setData()"
                  class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2 rounded text-sm font-bold shadow transition"
                >
                  Lưu
                </button>
                <button
                  onclick="getData()"
                  class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white py-2 rounded text-sm font-bold shadow transition"
                >
                  Đọc
                </button>
              </div>
            </div>
            <div
              id="action-log"
              class="text-sm p-3 rounded border hidden mb-2 font-mono"
            ></div>
            <ul
              id="key-list"
              class="space-y-2 text-sm max-h-[150px] overflow-y-auto"
            ></ul>
          </div>
        </div>
      </div>
    </div>

    <script>
      const PALETTE = [
        "#ef4444",
        "#3b82f6",
        "#10b981",
        "#f59e0b",
        "#8b5cf6",
        "#ec4899",
        "#06b6d4",
        "#f97316",
        "#84cc16",
      ];
      let portColors = {};
      let colorIdx = 0;

      function getColor(port) {
        if (!portColors[port]) {
          portColors[port] = PALETTE[colorIdx % PALETTE.length];
          colorIdx++;
        }
        return portColors[port];
      }

      async function fetchStatus() {
        const res = await fetch("/status");
        const data = await res.json();
        drawRing(data.nodes, data.keys);
        updateLists(data.nodes, data.keys);
      }

      async function syncData(silent = false) {
        if (!silent) showLog("Đang đồng bộ...");
        try {
          await fetch("/sync");
          if (!silent) {
            showLog("Đã đồng bộ xong dữ liệu từ các Node!");
            setTimeout(
              () =>
                (document.getElementById("action-log").style.display = "none"),
              2500,
            );
          }
        } catch (error) {
          if (!silent) showLog("Lỗi đồng bộ!", true);
        }
        fetchStatus();
      }

      function updateLists(nodes, keys) {
        const nodeList = document.getElementById("node-list");
        nodeList.innerHTML = "";
        for (const [url, info] of Object.entries(nodes)) {
          const port = url.split(":").pop();
          const nodeColor = info.active ? getColor(port) : "#9ca3af";

          nodeList.innerHTML += `
                    <li class="flex justify-between items-center bg-white p-2 rounded border shadow-sm">
                        <span class="text-sm font-bold flex items-center gap-2" style="color: ${nodeColor}; ${!info.active ? "text-decoration: line-through;" : ""}">
                            <span style="width:12px; height:12px; border-radius:50%; background-color:${nodeColor}"></span>
                            Port: ${port} <span class="font-normal text-xs text-gray-400">(${info.angle}°)</span>
                        </span>
                        <button onclick="toggleNode('${url}')" class="text-xs bg-slate-100 hover:bg-slate-200 border px-3 py-1 rounded transition text-slate-600">
                            ${info.active ? "Tắt" : "Bật"}
                        </button>
                    </li>`;
        }
        const keyList = document.getElementById("key-list");
        keyList.innerHTML = "";

        let keysByPort = {};
        for (const url of Object.keys(nodes)) {
          keysByPort[url.split(":").pop()] = [];
        }

        for (const [key, info] of Object.entries(keys)) {
          if (!info.replicas) continue;

          info.replicas.forEach((port, index) => {
            if (!keysByPort[port]) keysByPort[port] = [];
            keysByPort[port].push({
              name: key,
              angle: info.angle,
              isPrimary: index === 0,
            });
          });
        }


        for (const [port, portKeys] of Object.entries(keysByPort)) {
          if (portKeys.length === 0) continue;

          const nodeColor = nodes[`http://127.0.0.1:${port}`]?.active
            ? getColor(port)
            : "#9ca3af";

          keyList.innerHTML += `
                    <div class="text-xs font-bold mt-4 mb-2 flex items-center gap-1" style="color: ${nodeColor}">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
                        Lưu trữ tại Server ${port}
                    </div>`;

          portKeys.forEach((k) => {
            // Badge phân biệt Bản Chính và Bản Sao
            const roleBadge = k.isPrimary
              ? `<span class="text-[10px] text-blue-600 bg-blue-50 px-2 py-1 rounded border border-blue-100 font-medium">Bản chính</span>`
              : `<span class="text-[10px] text-gray-500 bg-gray-100 px-2 py-1 rounded border border-gray-200">Bản sao</span>`;

            keyList.innerHTML += `
                        <li class="bg-white p-2 rounded border shadow-sm flex justify-between items-center ml-2 border-l-4 mb-1 ${k.isPrimary ? "" : "opacity-80"}" style="border-left-color: ${nodeColor}">
                            <b style="color: ${nodeColor}">${k.name} <span class="text-[10px] font-normal text-gray-400">(${k.angle}°)</span></b>
                            ${roleBadge}
                        </li>`;
          });
        }
      }

      function showLog(msg, isError = false) {
        const log = document.getElementById("action-log");
        log.innerHTML = msg;
        log.style.display = "block";
        log.className = `text-sm p-3 rounded border mb-2 ${isError ? "bg-red-50 text-red-700 border-red-200" : "bg-green-50 text-green-700 border-green-200"}`;
      }

      async function addNode() {
        const port = document.getElementById("node-port").value;
        if (!port) return showLog("Vui lòng nhập Port!", true);
        showLog("Đang Thêm Server và tổ chức lại dải băm (Rebalancing)...");
        const res = await fetch("/add_node", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: `http://127.0.0.1:${port}` }),
        });
        const data = await res.json();
        showLog(` ${data.message}`);
        fetchStatus();
      }

      async function toggleNode(url) {
        await fetch("/toggle_node", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });
        fetchStatus();
      }

      async function setData() {
        const key = document.getElementById("data-key").value;
        const value = document.getElementById("data-value").value;
        const replicas = document.getElementById("data-replicas").value;
        if (!key) return showLog("Nhập Key!", true);
        const res = await fetch("/set", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ key, value, replicas }),
        });
        const data = await res.json();
        showLog(data.message, data.status === "error");
        fetchStatus();
      }

      async function getData() {
        const key = document.getElementById("data-key").value;
        if (!key) return showLog("Nhập Key!", true);
        const res = await fetch(`/get?key=${key}`);
        const data = await res.json();
        if (data.status === "success")
          showLog(
            `<b>${key}</b> = ${data.value} <br><span class="text-xs text-gray-500 italic">Dữ liệu từ: ${data.fetched_from}</span>`,
          );
        else showLog(data.message, true);
        fetchStatus();
      }

      function drawRing(nodesDict, keysDict) {
        const ring = document.getElementById("ui-ring");

        // Vẽ mặt nền: 2 Trục tọa độ và các mốc góc độ
        const baseHTML = `
                <div style="position: absolute; width: 2px; height: 100%; background: #e2e8f0; left: 50%; transform: translateX(-50%); z-index: 1;"></div>
                <div style="position: absolute; width: 100%; height: 2px; background: #e2e8f0; top: 50%; transform: translateY(-50%); z-index: 1;"></div>
                
                <div style="position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #64748b; font-weight: bold;">0°</div>
                <div style="position: absolute; right: -30px; top: 50%; transform: translateY(-50%); font-size: 12px; color: #64748b; font-weight: bold;">90°</div>
                <div style="position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #64748b; font-weight: bold;">180°</div>
                <div style="position: absolute; left: -35px; top: 50%; transform: translateY(-50%); font-size: 12px; color: #64748b; font-weight: bold;">270°</div>

                <div class="center-dot" style="z-index: 2;"></div>
            `;
        ring.innerHTML = baseHTML;

        // Vẽ Node
        for (const [url, info] of Object.entries(nodesDict)) {
          const port = url.split(":").pop();
          const nodeColor = info.active ? getColor(port) : "#9ca3af";

          const rad = (info.angle - 90) * (Math.PI / 180);
          const x = 175 + 175 * Math.cos(rad);
          const y = 175 + 175 * Math.sin(rad);

          const shadow = info.active
            ? `box-shadow: 0 0 10px ${nodeColor};`
            : "";

          ring.innerHTML += `<div class="node-point" style="left:${x}px; top:${y}px; background-color: ${nodeColor}; ${shadow}"></div>
                                   <div class="label" style="left:${x}px; top:${y}px; color: ${nodeColor}; z-index: 10;">${port} (${info.angle}°)</div>`;
        }

        let angleCollisionCount = {};
        for (const [key, info] of Object.entries(keysDict)) {
          if (info.angle === undefined) continue;

          const primaryPort = info.replicas[0];
          const keyColor =
            primaryPort && nodesDict[`http://127.0.0.1:${primaryPort}`]?.active
              ? getColor(primaryPort)
              : "#9ca3af";

          angleCollisionCount[info.angle] =
            (angleCollisionCount[info.angle] || 0) + 1;
          const radius = 135 - (angleCollisionCount[info.angle] - 1) * 20;

          const rad = (info.angle - 90) * (Math.PI / 180);
          const x = 175 + radius * Math.cos(rad);
          const y = 175 + radius * Math.sin(rad);

          ring.innerHTML += `<div class="key-point" style="left:${x}px; top:${y}px; background-color: ${keyColor}"></div>
                                   <div class="label" style="left:${x}px; top:${y}px; color: ${keyColor}; transform: translate(-50%, -150%);">${key} (${info.angle}°)</div>`;
        }
      }

      fetchStatus();
      setInterval(fetchStatus, 3000);
    </script>
  </body>
</html>
